<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Admin — ShiftScheduler</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="/src/shared/navbar.css" />
  <link rel="stylesheet" href="/src/pages/admin/admin.css" />
</head>
<body class="bg-light">

  <!-- Navbar rendered by shared/navbar.js -->

  <main class="container-fluid px-4 px-xl-5 py-4">

    <!-- Page header -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
      <div>
        <h1 class="fw-bold fs-3 mb-0">
          <i class="bi bi-shield-lock me-2 text-primary"></i>Admin
        </h1>
        <p class="text-muted mb-0 small">Manage users across your organisation.</p>
      </div>
    </div>

    <!-- Filter controls -->
    <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
      <div class="position-relative">
        <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="left: 0.75rem;"></i>
        <input type="text" class="form-control form-control-sm ps-5" id="search-input"
               placeholder="Search by name or email…" style="max-width: 280px;" />
      </div>
      <select class="form-select form-select-sm" id="role-filter" style="max-width: 155px;">
        <option value="all">All Roles</option>
        <option value="super_admin">Super Admin</option>
        <option value="admin">Admin</option>
        <option value="employee">Employee</option>
      </select>
      <select class="form-select form-select-sm" id="status-filter" style="max-width: 135px;">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <!-- Users table -->
    <div class="card border-0 shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
              <tr>
                <th class="ps-3">User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Team(s)</th>
                <th>Status</th>
                <th class="text-end pe-3">Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
        <div class="text-center py-5 text-muted d-none" id="users-empty">
          <i class="bi bi-people display-4 d-block mb-3 opacity-50"></i>
          <p class="mb-0">No users found.</p>
        </div>
        <!-- Loading state -->
        <div class="text-center py-5" id="users-loading">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading…</span>
          </div>
          <p class="text-muted mt-2 mb-0 small">Loading users…</p>
        </div>
      </div>
    </div>

    <!-- User count -->
    <div class="mt-2 text-muted small" id="user-count"></div>

  </main>

  <!-- ── Confirm Toggle Modal ── -->
  <div class="modal fade" id="toggle-modal" tabindex="-1" aria-labelledby="toggle-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="toggle-modal-label">
            <i class="bi bi-exclamation-triangle me-1 text-warning"></i>
            <span id="toggle-title">Confirm</span>
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p class="mb-0" id="toggle-message"></p>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-sm" id="confirm-toggle-btn">
            <span id="toggle-btn-label">Confirm</span>
            <span class="spinner-border spinner-border-sm ms-2 d-none" id="toggle-spinner" role="status" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/pages/admin/admin.js"></script>
</body>
</html>
